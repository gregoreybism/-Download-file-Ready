<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 

<title>Download File Ready</title>

 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

 

<style>

 

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

 

body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#001f2e,#000);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  overflow:hidden;
  position:relative;
}

 

/* PARTICLES */

 

.spark{
  position:absolute;
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  animation:rise 6s linear infinite;
  opacity:.7;
  box-shadow:0 0 14px #38bdf8;
}

 

@keyframes rise{
  from{
    transform:translateY(0);
  }

 

  to{
    transform:translateY(-800px);
  }
}

 

/* CARD */

 

.card{
  width:360px;
  padding:2.2rem;
  text-align:center;
  border-radius:20px;
  background:rgba(56,189,248,.06);
  backdrop-filter:blur(18px);
  border:1px solid rgba(56,189,248,.25);
  box-shadow:0 0 40px rgba(56,189,248,.22);
  position:relative;
  z-index:2;
}

 

/* TITLE */

 

h1{
  font-size:1.7rem;
  margin-bottom:5px;
  color:#22c55e;
}

 

.sub{
  font-size:.85rem;
  color:#bae6fd;
  margin-bottom:1.8rem;
}

 

/* LOADER */

 

.circle-wrap{
  position:relative;
  width:130px;
  height:130px;
  margin:0 auto 1.5rem;
}

 

.circle{
  width:130px;
  height:130px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.08);
  border-top:6px solid #22c55e;
  animation:spin 1s linear infinite;
}

 

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

 

/* CENTER TEXT */

 

.secured{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:1rem;
  font-weight:600;
  color:#bbf7d0;
  text-transform:uppercase;
  letter-spacing:1px;
}

 

/* PERCENT */

 

.percent{
  font-size:2.2rem;
  font-weight:600;
  color:#86efac;
  margin-bottom:.5rem;
}

 

/* MESSAGE */

 

.msg{
  font-size:.95rem;
  margin-bottom:1rem;
}

 

/* BADGE */

 

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(34,197,94,.15);
  border:1px solid rgba(34,197,94,.3);
  font-size:.8rem;
  color:#bbf7d0;
}

 

</style>
</head>

 

<body>

 

<!-- PARTICLES -->

 

<script>

 

for(let i=0;i<50;i++){

 

  let s=document.createElement("div");

 

  s.className="spark";

 

  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";

 

  s.style.animationDuration=(4+Math.random()*4)+"s";

 

  document.body.appendChild(s);

 

}

 

</script>

 

<!-- CARD -->

 

<div class="card">

 

  <h1>🚀 Download File Ready</h1>

 

  <div class="sub">
    secure download preparation
</div>

 

  <!-- CIRCLE -->

 

  <div class="circle-wrap">

 

    <div class="circle"></div>

 

    <div class="secured">
      Secured
</div>

 

  </div>

 

  <!-- TEXT -->

 

  <div class="percent" id="percent">
    0%
</div>

 

  <div class="msg" id="msg">
    🧭 preparing route...
</div>

 

  <div class="badge" id="badge">
    🟢 starting
</div>

 

</div>

 

<!-- LOADER -->

 

<script>

 

let progress = 0;

 

const percent = document.getElementById("percent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const steps = [

 

  ["🧭 preparing route...", "🟢 starting"],

 

  ["🔎 checking download path...", "📡 scanning"],

 

  ["📦 locating file...", "📁 finding"],

 

  ["🔑 validating access...", "🔐 verifying"],

 

  ["⚙ optimizing route...", "🔁 routing"],

 

  ["🛡 securing connection...", "🛡 safe"],

 

  ["✅ access approved", "✔ approved"],

 

  ["🚀 launching access...", "⚡ finalizing"],

 

  ["✨ redirecting now...", "➡ moving"]

 

];

 

function run(){

 

  progress += Math.random()*7;

 

  if(progress >= 100){

 

    progress = 100;

 

    percent.textContent = "100%";

 

    msg.textContent = "✨ redirecting...";

 

    badge.textContent = "🚀 done";

 

    setTimeout(()=>{

 

      window.location.href = "https://gadgetpilot.site/desire-file/";

 

    },1000);

 

    return;
  }

 

  percent.textContent = Math.floor(progress)+"%";

 

  let i = Math.floor((progress/100)*steps.length);

 

  if(i >= steps.length){
    i = steps.length - 1;
  }

 

  msg.textContent = steps[i][0];

 

  badge.textContent = steps[i][1];

 

  setTimeout(run,140);

 

}

 

run();

 

</script>

 

</body>
</html>
