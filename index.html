<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ Neon Shield Security</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    position:relative;
    color:white;
}

/* animated gradient background */

body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle at 20% 20%, #00f5ff33 0%, transparent 25%),
    radial-gradient(circle at 80% 30%, #ff00ff33 0%, transparent 25%),
    radial-gradient(circle at 50% 80%, #00ff9955 0%, transparent 25%),
    radial-gradient(circle at 90% 90%, #6a00ff44 0%, transparent 20%);
    animation:bgRotate 20s linear infinite;
}

@keyframes bgRotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* floating particles */

.particle{
    position:absolute;
    border-radius:50%;
    background:white;
    opacity:0.2;
    animation:float 12s infinite linear;
}

.particle:nth-child(1){
    width:6px;
    height:6px;
    left:10%;
    animation-duration:10s;
}

.particle:nth-child(2){
    width:10px;
    height:10px;
    left:30%;
    animation-duration:15s;
}

.particle:nth-child(3){
    width:5px;
    height:5px;
    left:60%;
    animation-duration:9s;
}

.particle:nth-child(4){
    width:8px;
    height:8px;
    left:80%;
    animation-duration:18s;
}

.particle:nth-child(5){
    width:12px;
    height:12px;
    left:50%;
    animation-duration:14s;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* main card */

.box{
    position:relative;
    z-index:2;

    width:420px;
    max-width:90%;

    padding:40px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 0 30px rgba(0,255,255,0.15),
    0 0 60px rgba(255,0,255,0.08);

    text-align:center;
}

/* logo */

.logo{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:20px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#00f5ff,#ff00ff);

    box-shadow:
    0 0 20px #00f5ff,
    0 0 40px #ff00ff;

    font-size:2.5rem;
}

/* title */

h1{
    font-size:2.2rem;
    margin-bottom:10px;

    background:linear-gradient(90deg,#00f5ff,#00ff99,#ff00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sub{
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:0.95rem;
}

/* progress bar */

.bar{
    width:100%;
    height:18px;

    border-radius:30px;

    overflow:hidden;

    background:rgba(255,255,255,0.08);

    margin-bottom:22px;
}

.fill{
    width:0%;
    height:100%;

    border-radius:30px;

    background:linear-gradient(
    90deg,
    #00f5ff,
    #00ff99,
    #ff00ff
    );

    box-shadow:
    0 0 15px #00f5ff,
    0 0 30px #ff00ff;

    transition:0.25s;
}

/* percentage */

.percent{
    font-size:3rem;
    font-weight:700;
    margin-bottom:15px;

    text-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* status text */

.msg{
    color:#e2e8f0;
    margin-bottom:20px;
    font-size:1rem;
}

/* badge */

.badge{
    display:inline-block;

    padding:10px 22px;

    border-radius:50px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    color:#00f5ff;

    font-size:0.9rem;
}

/* dots loading animation */

.dots::after{
    content:'';
    animation:dots 1s infinite;
}

@keyframes dots{
    0%{content:'';}
    33%{content:'.';}
    66%{content:'..';}
    100%{content:'...';}
}

/* mobile */

@media(max-width:500px){

    .box{
        padding:30px 22px;
    }

    h1{
        font-size:1.8rem;
    }

    .percent{
        font-size:2.5rem;
    }

}

</style>
</head>

<body>

<!-- particles -->

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<!-- card -->

<div class="box">

    <div class="logo">
        🛡️
    </div>

    <h1>Secure Gateway</h1>

    <div class="sub">
        AI Powered Secure Verification System
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div class="percent" id="percent">
        0%
    </div>

    <div class="msg dots" id="msg">
        Initializing secure connection
    </div>

    <div class="badge" id="badge">
        Starting...
    </div>

</div>

<script>

let progress = 0;

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

const steps = [

    ["🔍 Scanning secure channels","Analyzing"],
    ["🔐 Encrypting packets","Encrypting"],
    ["🌐 Connecting servers","Routing"],
    ["🛡️ Applying protection","Securing"],
    ["⚡ Optimizing network","Optimizing"],
    ["✅ Connection verified","Verified"],
    ["🚀 Preparing redirect","Launching"]

];

function updateProgress(){

    progress += Math.random() * 6;

    if(progress >= 100){

        progress = 100;

        fill.style.width = "100%";

        percent.textContent = "100%";

        msg.textContent = "🚀 Redirecting now...";

        badge.textContent = "Completed";

        setTimeout(()=>{

            /* YOUR REDIRECT URL */

            window.location.href = "https://gadgetpilot.site/desire-file/";

        },3500);

        return;
    }

    fill.style.width = progress + "%";

    percent.textContent = Math.floor(progress) + "%";

    let index = Math.min(
        Math.floor((progress / 100) * steps.length),
        steps.length - 1
    );

    msg.textContent = steps[index][0];

    badge.textContent = steps[index][1];

    setTimeout(updateProgress,120);

}

updateProgress();

</script>

</body>
</html>
