<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download File Ready • Secure Download Access</title>

 

<style>
*{margin:0;padding:0;box-sizing:border-box}

 

body{
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#031b2e,#020617 70%);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

 

.spark{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#38bdf8;
  box-shadow:0 0 14px #38bdf8;
  opacity:.7;
  animation:rise linear infinite;
}

 

@keyframes rise{
  from{transform:translateY(0);opacity:.8}
  to{transform:translateY(-850px);opacity:0}
}

 

.glow{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  opacity:.22;
}

 

.glow1{
  width:260px;
  height:260px;
  background:#38bdf8;
  top:-80px;
  left:-80px;
}

 

.glow2{
  width:260px;
  height:260px;
  background:#22c55e;
  bottom:-100px;
  right:-100px;
}

 

.card{
  width:390px;
  max-width:92%;
  padding:38px 28px;
  border-radius:26px;
  text-align:center;
  background:rgba(15,23,42,.72);
  border:1px solid rgba(56,189,248,.28);
  box-shadow:0 0 50px rgba(56,189,248,.18);
  position:relative;
  z-index:5;
}

 

.logo{
  font-size:30px;
  font-weight:700;
  margin-bottom:6px;
  color:#38bdf8;
}

 

.logo span{
  color:#22c55e;
}

 

.sub{
  color:#bae6fd;
  font-size:14px;
  margin-bottom:30px;
}

 

.circle-wrap{
  position:relative;
  width:145px;
  height:145px;
  margin:0 auto 26px;
}

 

.circle{
  width:145px;
  height:145px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.08);
  border-top:6px solid #38bdf8;
  border-right:6px solid #22c55e;
  animation:spin 1s linear infinite;
}

 

@keyframes spin{
  to{transform:rotate(360deg)}
}

 

.percent{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:700;
  color:#e0f2fe;
}

 

.msg{
  font-size:16px;
  margin-bottom:16px;
  color:#e2e8f0;
}

 

.badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(56,189,248,.12);
  border:1px solid rgba(56,189,248,.28);
  color:#bae6fd;
  font-size:13px;
  font-weight:600;
}

 

.note{
  margin-top:20px;
  font-size:12px;
  color:#94a3b8;
  line-height:1.7;
}

 

@media(max-width:520px){
  .card{padding:32px 22px}
  .logo{font-size:26px}
}
</style>
</head>

 

<body>

 

<div class="glow glow1"></div>
<div class="glow glow2"></div>

 

<div class="card">
<div class="logo">🚀 Download <span>File Ready</span></div>
<div class="sub">secure download preparation</div>

 

  <div class="circle-wrap">
<div class="circle"></div>
<div class="percent" id="percent">0%</div>
</div>

 

  <div class="msg" id="msg">🧭 preparing secure route...</div>
<div class="badge" id="badge">🟢 starting</div>

 

  <div class="note">Please wait while we prepare your secure download access.</div>
</div>

 

<script>
for(let i=0;i<55;i++){
  let s=document.createElement("div");
  s.className="spark";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDuration=(4+Math.random()*5)+"s";
  s.style.animationDelay=(Math.random()*3)+"s";
  document.body.appendChild(s);
}

 

let progress = 0;

 

const percent = document.getElementById("percent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const finalURL = "https://gadgetpilot.site/desire-file/";

 

const steps = [
  ["🧭 preparing secure route...", "🟢 starting"],
  ["🔎 checking download path...", "📡 scanning"],
  ["📦 locating setup package...", "📁 locating"],
  ["🔑 validating secure access...", "🔐 verifying"],
  ["⚙ optimizing connection...", "🔁 routing"],
  ["🛡 securing transfer channel...", "🛡 protected"],
  ["✅ access approved", "✔ approved"],
  ["🚀 preparing redirect...", "⚡ finalizing"],
  ["✨ redirecting now...", "➡ moving"]
];

 

function runLoader(){
  progress += Math.random() * 7;

 

  if(progress >= 100){
    progress = 100;
    percent.textContent = "100%";
    msg.textContent = "✨ redirecting now...";
    badge.textContent = "🚀 done";

 

    setTimeout(function(){
      window.location.href = finalURL;
    },1000);

 

    return;
  }

 

  percent.textContent = Math.floor(progress) + "%";

 

  let i = Math.floor((progress / 100) * steps.length);
  if(i >= steps.length){i = steps.length - 1;}

 

  msg.textContent = steps[i][0];
  badge.textContent = steps[i][1];

 

  setTimeout(runLoader,140);
}

 

runLoader();
</script>

 

</body>
</html>
