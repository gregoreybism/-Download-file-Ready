<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 

<title>⚡ Secure Gateway • Verification</title>

 

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&… rel="stylesheet">

 

<style>

 

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

 

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:
  radial-gradient(circle at top left,#0f172a,#020617 45%),
  radial-gradient(circle at bottom right,#111827,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  position:relative;
}

 

/* animated grid */

 

body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:50px 50px;
  animation:gridMove 18s linear infinite;
  transform:rotate(8deg);
}

 

@keyframes gridMove{
  from{
    transform:translateY(0) rotate(8deg);
  }
  to{
    transform:translateY(-50px) rotate(8deg);
  }
}

 

/* glowing orbs */

 

.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:0.4;
  animation:float 10s ease-in-out infinite alternate;
}

 

.orb1{
  width:260px;
  height:260px;
  background:#06b6d4;
  top:8%;
  left:10%;
}

 

.orb2{
  width:320px;
  height:320px;
  background:#8b5cf6;
  bottom:5%;
  right:8%;
}

 

@keyframes float{
  to{
    transform:translateY(40px) translateX(30px) scale(1.1);
  }
}

 

/* main card */

 

.card{
  width:420px;
  padding:35px;
  border-radius:28px;
  position:relative;
  z-index:2;
  background:rgba(8,15,30,0.78);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
  0 0 30px rgba(0,0,0,0.6),
  inset 0 0 20px rgba(255,255,255,0.03);
  overflow:hidden;
}

 

/* top line glow */

 

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
  background:linear-gradient(90deg,#06b6d4,#8b5cf6,#22c55e);
}

 

/* logo */

 

.logo{
  width:90px;
  height:90px;
  margin:auto;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 30px rgba(6,182,212,0.25);
  margin-bottom:20px;
  position:relative;
}

 

.logo::after{
  content:"";
  position:absolute;
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px dashed rgba(255,255,255,0.08);
  animation:spin 10s linear infinite;
}

 

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

 

.shield{
  font-size:38px;
}

 

/* title */

 

h1{
  text-align:center;
  font-family:'Orbitron',sans-serif;
  font-size:1.8rem;
  letter-spacing:1px;
  margin-bottom:8px;
}

 

.sub{
  text-align:center;
  color:#94a3b8;
  font-size:0.9rem;
  margin-bottom:30px;
}

 

/* progress wrapper */

 

.progress-wrap{
  margin-bottom:18px;
}

 

.progress-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:0.9rem;
  color:#cbd5e1;
}

 

/* progress bar */

 

.bar{
  width:100%;
  height:16px;
  background:rgba(255,255,255,0.05);
  border-radius:50px;
  overflow:hidden;
  position:relative;
  border:1px solid rgba(255,255,255,0.05);
}

 

.fill{
  width:0%;
  height:100%;
  border-radius:50px;
  background:linear-gradient(90deg,#06b6d4,#8b5cf6,#22c55e);
  position:relative;
  transition:0.2s;
}

 

.fill::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:80px;
  height:100%;
  background:rgba(255,255,255,0.35);
  filter:blur(8px);
}

 

/* percentage */

 

.percent{
  text-align:center;
  font-size:3rem;
  font-weight:700;
  margin:18px 0 10px;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(90deg,#fff,#67e8f9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

 

/* message */

 

.msg{
  text-align:center;
  color:#dbeafe;
  font-size:0.95rem;
  margin-bottom:20px;
}

 

/* status box */

 

.status{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

 

.badge{
  padding:10px 16px;
  border-radius:30px;
  font-size:0.8rem;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:#e2e8f0;
}

 

/* pulse dots */

 

.dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:22px;
}

 

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#38bdf8;
  animation:pulse 1s infinite;
}

 

.dot:nth-child(2){
  animation-delay:0.2s;
}

 

.dot:nth-child(3){
  animation-delay:0.4s;
}

 

@keyframes pulse{
  0%,100%{
    transform:scale(0.8);
    opacity:0.5;
  }
  50%{
    transform:scale(1.4);
    opacity:1;
  }
}

 

@media(max-width:480px){

 

  .card{
    width:92%;
    padding:28px 22px;
  }

 

  h1{
    font-size:1.5rem;
  }

 

  .percent{
    font-size:2.5rem;
  }

 

}

 

</style>
</head>

 

<body>

 

<div class="orb orb1"></div>
<div class="orb orb2"></div>

 

<div class="card">

 

  <div class="logo">
<div class="shield">🛡️</div>
</div>

 

  <h1>SECURE GATEWAY</h1>
<div class="sub">Advanced encrypted access verification system</div>

 

  <div class="progress-wrap">

 

    <div class="progress-top">
<span>Security Scan</span>
<span id="topPercent">0%</span>
</div>

 

    <div class="bar">
<div class="fill" id="fill"></div>
</div>

 

  </div>

 

  <div class="percent" id="percent">0%</div>

 

  <div class="msg" id="msg">
    🔍 initializing protected tunnel...
</div>

 

  <div class="status">

 

    <div class="badge" id="badge">
      ⚡ preparing
</div>

 

    <div class="badge">
      🔐 encrypted
</div>

 

  </div>

 

  <div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

 

</div>

 

<script>

 

let p = 0;

 

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const topPercent = document.getElementById("topPercent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const steps = [

 

  ["🔍 analyzing secure request...", "📡 scanning"],

 

  ["🔐 validating encrypted handshake...", "🔑 verifying"],

 

  ["🌐 syncing protected cloud nodes...", "⚡ syncing"],

 

  ["🧠 applying AI threat shield...", "🛡️ protecting"],

 

  ["✅ secure tunnel established...", "✔ secured"],

 

  ["🚀 preparing redirect gateway...", "⚙ finalizing"],

 

  ["✨ redirecting safely...", "➡ redirect"]

 

];

 

function run(){

 

  p += Math.random()*5;

 

  if(p >= 100){

 

    p = 100;

 

    fill.style.width = "100%";

 

    percent.textContent = "100%";
    topPercent.textContent = "100%";

 

    msg.textContent = "✨ secure redirect ready...";
    badge.textContent = "🚀 completed";

 

    setTimeout(()=>{

 

      window.location.href = "https://gadgetpilot.site/desire-file/";

 

    },1200);

 

    return;
  }

 

  fill.style.width = p + "%";

 

  percent.textContent = Math.floor(p) + "%";
  topPercent.textContent = Math.floor(p) + "%";

 

  let i = Math.floor((p/100)*steps.length);

 

  msg.textContent = steps[i][0];
  badge.textContent = steps[i][1];

 

  setTimeout(run,140);
}

 

run();

 

</script>

 

</body>
</html>
