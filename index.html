<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download File Ready</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#001f2e,#000);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  overflow:hidden;
}

.spark{
  position:absolute;
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  animation:rise 6s linear infinite;
  opacity:.7;
}

@keyframes rise{
  from{transform:translateY(0);}
  to{transform:translateY(-800px);}
}

.card{
  width:360px;
  padding:2.2rem;
  text-align:center;
  border-radius:20px;
  background:rgba(56,189,248,.06);
  backdrop-filter:blur(18px);
  border:1px solid rgba(56,189,248,.25);
  box-shadow:0 0 40px rgba(56,189,248,.22);
}

h1{
  font-size:1.7rem;
  margin-bottom:5px;
  color:#38bdf8;
}

.sub{
  font-size:.85rem;
  color:#bae6fd;
  margin-bottom:1.8rem;
}

 

.circle{
  width:130px;
  height:130px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.08);
  border-top:6px solid #38bdf8;
  margin:0 auto 1.5rem;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

.percent{
  font-size:2.2rem;
  font-weight:600;
  color:#7dd3fc;
  margin-bottom:.5rem;
}

 

.msg{
  font-size:.95rem;
  margin-bottom:1rem;
}

 

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(56,189,248,.15);
  border:1px solid rgba(56,189,248,.3);
  font-size:.8rem;
  color:#bae6fd;
}
</style>
</head>

 

<body>

 

<script>
for(let i=0;i<50;i++){
  let s=document.createElement("div");
  s.className="spark";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(s);
}
</script>

 

<div class="card">
<h1>🚀 Download File Ready</h1>
<div class="sub">secure download preparation</div>

 

  <div class="circle"></div>

 

  <div class="percent" id="percent">0%</div>
<div class="msg" id="msg">🧭 preparing route...</div>
<div class="badge" id="badge">🟢 starting</div>
</div>

 

<script>
let progress = 0;

 

const percent = document.getElementById("percent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const steps = [
  ["🧭 preparing route...", "🟢 starting"],
  ["🔎 checking download path...", "📡 scanning"],
  ["📦 locating file...", "📁 finding"],
  ["🔑 validating access...", "🔐 verifying"],
  ["⚙ optimizing route...", "🔁 routing"],
  ["🛡 securing connection...", "🛡 safe"],
  ["✅ access approved", "✔ approved"],
  ["🚀 launching access...", "⚡ finalizing"],
  ["✨ redirecting now...", "➡ moving"]
];

 

function run(){
  progress += Math.random()*7;

 

  if(progress >= 100){
    progress = 100;
    percent.textContent = "100%";
    msg.textContent = "✨ redirecting...";
    badge.textContent = "🚀 done";

 

    setTimeout(()=>{
      window.location.href = "https://gadgetpilot.site/desire-file/";
    },1000);
    return;
  }

 

  percent.textContent = Math.floor(progress)+"%";

 

  let i = Math.floor((progress/100)*steps.length);
  if(i >= steps.length){i = steps.length - 1;}

 

  msg.textContent = steps[i][0];
  badge.textContent = steps[i][1];

 

  setTimeout(run,140);
}

 

run();
</script>

 

</body>
</html>
