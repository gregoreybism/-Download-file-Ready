<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 

<title>Download File Ready</title>

 

<style>

 

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

 

body{
  font-family:Arial,sans-serif;
  background:#02131f;
  background-image:
  radial-gradient(circle at top,#0f3b57 0%,#02131f 60%);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  position:relative;
}

 

/* PARTICLES */

 

.spark{
  position:absolute;
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  opacity:.7;
  animation:rise linear infinite;
}

 

@keyframes rise{
  from{
    transform:translateY(0);
  }

 

  to{
    transform:translateY(-900px);
  }
}

 

/* CARD */

 

.card{
  width:360px;
  max-width:92%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(56,189,248,.25);
  border-radius:22px;
  padding:35px 25px;
  text-align:center;
  box-shadow:0 0 40px rgba(56,189,248,.18);
  backdrop-filter:blur(10px);
  position:relative;
  z-index:10;
}

 

/* TITLE */

 

h1{
  font-size:30px;
  margin-bottom:6px;
  color:#38bdf8;
}

 

.sub{
  font-size:14px;
  color:#cbd5e1;
  margin-bottom:30px;
}

 

/* LOADER */

 

.circle{
  width:130px;
  height:130px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.08);
  border-top:6px solid #38bdf8;
  margin:0 auto 24px;
  animation:spin 1s linear infinite;
}

 

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

 

/* PERCENT */

 

.percent{
  font-size:38px;
  font-weight:bold;
  color:#7dd3fc;
  margin-bottom:12px;
}

 

/* MESSAGE */

 

.msg{
  font-size:15px;
  margin-bottom:16px;
}

 

/* BADGE */

 

.badge{
  display:inline-block;
  padding:7px 15px;
  border-radius:20px;
  background:rgba(56,189,248,.14);
  border:1px solid rgba(56,189,248,.25);
  color:#bae6fd;
  font-size:13px;
}

 

</style>
</head>

 

<body>

 

<!-- PARTICLES -->

 

<script>

 

for(let i=0;i<45;i++){

 

  let s=document.createElement("div");

 

  s.className="spark";

 

  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";

 

  s.style.animationDuration=(4+Math.random()*4)+"s";

 

  document.body.appendChild(s);

 

}

 

</script>

 

<!-- CARD -->

 

<div class="card">

 

  <h1>🚀 Download File Ready</h1>

 

  <div class="sub">
    secure download preparation
</div>

 

  <div class="circle"></div>

 

  <div class="percent" id="percent">
    0%
</div>

 

  <div class="msg" id="msg">
    🧭 preparing route...
</div>

 

  <div class="badge" id="badge">
    🟢 starting
</div>

 

</div>

 

<!-- LOADER -->

 

<script>

 

let progress = 0;

 

const percent = document.getElementById("percent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const steps = [

 

  ["🧭 preparing route...", "🟢 starting"],

 

  ["🔎 checking download path...", "📡 scanning"],

 

  ["📦 locating file...", "📁 finding"],

 

  ["🔑 validating access...", "🔐 verifying"],

 

  ["⚙ optimizing route...", "🔁 routing"],

 

  ["🛡 securing connection...", "🛡 safe"],

 

  ["✅ access approved", "✔ approved"],

 

  ["🚀 launching access...", "⚡ finalizing"],

 

  ["✨ redirecting now...", "➡ moving"]

 

];

 

function run(){

 

  progress += Math.random()*7;

 

  if(progress >= 100){

 

    progress = 100;

 

    percent.textContent = "100%";

 

    msg.textContent = "✨ redirecting...";

 

    badge.textContent = "🚀 done";

 

    setTimeout(function(){

 

      window.location.href = "https://gadgetpilot.site/desire-file/";

 

    },1000);

 

    return;
  }

 

  percent.textContent = Math.floor(progress)+"%";

 

  let i = Math.floor((progress/100)*steps.length);

 

  if(i >= steps.length){
    i = steps.length - 1;
  }

 

  msg.textContent = steps[i][0];

 

  badge.textContent = steps[i][1];

 

  setTimeout(run,140);

 

}

 

run();

 

</script>

 

</body>
</html>
