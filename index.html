<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Gateway Verification</title>

 

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

 

body{
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#042f2e);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  overflow:hidden;
}

 

.bg{
  position:fixed;
  width:420px;
  height:420px;
  border-radius:50%;
  filter:blur(90px);
  opacity:.45;
}

 

.bg.one{
  background:#06b6d4;
  top:-120px;
  left:-100px;
}

 

.bg.two{
  background:#8b5cf6;
  bottom:-120px;
  right:-100px;
}

 

.card{
  position:relative;
  width:92%;
  max-width:430px;
  padding:35px 25px;
  text-align:center;
  border-radius:28px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 25px 70px rgba(0,0,0,.55);
  backdrop-filter:blur(16px);
}

 

.icon{
  width:86px;
  height:86px;
  margin:0 auto 18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
}

 

h1{
  font-size:28px;
  margin-bottom:8px;
}

 

.sub{
  font-size:14px;
  color:#cbd5e1;
  margin-bottom:28px;
}

 

.progress-info{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:#dbeafe;
  margin-bottom:10px;
}

 

.bar{
  width:100%;
  height:15px;
  border-radius:50px;
  overflow:hidden;
  background:rgba(255,255,255,.15);
  margin-bottom:20px;
}

 

.fill{
  width:0%;
  height:100%;
  border-radius:50px;
  background:linear-gradient(90deg,#22c55e,#06b6d4,#8b5cf6);
  transition:width .2s ease;
}

 

.percent{
  font-size:46px;
  font-weight:bold;
  margin-bottom:10px;
}

 

.msg{
  font-size:15px;
  color:#e5e7eb;
  margin-bottom:18px;
}

 

.badge{
  display:inline-block;
  padding:9px 18px;
  border-radius:30px;
  font-size:13px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
}

 

@media(max-width:480px){
  h1{
    font-size:24px;
  }

 

  .percent{
    font-size:40px;
  }
}
</style>
</head>

 

<body>

 

<div class="bg one"></div>
<div class="bg two"></div>

 

<div class="card">
<div class="icon">🛡️</div>

 

  <h1>Secure Gateway</h1>
<div class="sub">Please wait while your secure download route is prepared.</div>

 

  <div class="progress-info">
<span>Security Check</span>
<span id="topPercent">0%</span>
</div>

 

  <div class="bar">
<div class="fill" id="fill"></div>
</div>

 

  <div class="percent" id="percent">0%</div>
<div class="msg" id="msg">Initializing protected connection...</div>
<div class="badge" id="badge">Starting</div>
</div>

 

<script>
let progress = 0;

 

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const topPercent = document.getElementById("topPercent");
const msg = document.getElementById("msg");
const badge = document.getElementById("badge");

 

const steps = [
  ["Checking file request...", "Scanning"],
  ["Creating secure session...", "Verifying"],
  ["Preparing download server...", "Loading"],
  ["Connecting fast route...", "Syncing"],
  ["Final security check...", "Ready"],
  ["Redirecting now...", "Completed"]
];

 

function runLoader(){
  progress += Math.floor(Math.random() * 5) + 2;

 

  if(progress >= 100){
    progress = 100;

 

    fill.style.width = "100%";
    percent.textContent = "100%";
    topPercent.textContent = "100%";
    msg.textContent = "Redirecting now...";
    badge.textContent = "Completed";

 

    setTimeout(function(){
      window.location.href = "https://gadgetpilot.site/desire-file/";
    }, 1200);

 

    return;
  }

 

  fill.style.width = progress + "%";
  percent.textContent = progress + "%";
  topPercent.textContent = progress + "%";

 

  let index = Math.floor((progress / 100) * steps.length);

 

  if(index >= steps.length){
    index = steps.length - 1;
  }

 

  msg.textContent = steps[index][0];
  badge.textContent = steps[index][1];

 

  setTimeout(runLoader, 150);
}

 

runLoader();
</script>

 

</body>
</html>
